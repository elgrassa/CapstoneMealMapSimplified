name: capstone-self-score

# Runs alexeygrigorev/github-project-scorer against this public repo using the
# OPENAI_API_KEY in repo secrets. Commits the updated docs/self-score-report.md
# back to the branch.
#
# MANUAL-ONLY by design — each run costs ~$0.05-0.10 USD. Re-run after meaningful
# changes via Actions tab → "Run workflow". No push / PR / schedule triggers;
# PRs stay cheap.

on:
  workflow_dispatch:
    inputs:
      target_repo:
        description: "Override target repo URL (defaults to this repo)"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  self-score:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Resolve target repo URL
        id: target
        run: |
          INPUT_URL="${{ github.event.inputs.target_repo }}"
          if [ -n "$INPUT_URL" ]; then
            echo "url=$INPUT_URL" >> "$GITHUB_OUTPUT"
          else
            echo "url=https://github.com/${{ github.repository }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Run self-scorer
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SCORER_TARGET_REPO: ${{ steps.target.outputs.url }}
        run: |
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "::error::OPENAI_API_KEY secret is not set. Add it at: Settings → Secrets and variables → Actions."
            exit 1
          fi
          chmod +x scorer/run_self_score.sh
          bash scorer/run_self_score.sh

      - name: Commit report if changed
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/self-score-report.md
          if git diff --cached --quiet; then
            echo "No changes to self-score-report.md — scorer output is identical to the committed version."
          else
            git commit -m "chore(capstone): refresh self-score report via scorer workflow [skip ci]"
            git push
          fi

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: self-score-report
          path: docs/self-score-report.md
          if-no-files-found: error
