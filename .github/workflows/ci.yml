name: capstone-ci

# Free, no-secrets CI gate — runs on every push to main + every PR.
# Live LLM eval is MANUAL-ONLY (Actions tab → workflow_dispatch).

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install project
        run: |
          pip install -e ".[dev]"

      - name: Seed demo corpus
        run: |
          python3 scripts/seed_demo.py

      - name: Run pytest (unit + judge, offline)
        run: |
          python3 -m pytest tests/ -q --tb=short

      - name: Run offline eval (mock LLM fixtures)
        run: |
          python3 ai/week1-rag/evals/offline_eval.py --mode offline --fixtures fixtures/mock_llm_responses.json || echo "offline eval skipped — fixture validation only"

      - name: Run tuning experiments sweep
        run: |
          python3 scripts/tuning_experiments.py --json-out docs/tuning_results.json

      - name: Upload eval report as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-report
          path: ai/week1-rag/logs/
          if-no-files-found: ignore

  mutation-tests:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
      - run: pip install -e ".[dev,test]"
      - name: Seed demo
        run: python3 scripts/seed_demo.py
      - name: Run mutation tests on critical validation modules
        run: |
          python3 -m mutmut run --max-children 4 || true
          python3 -m mutmut results
      - name: Upload mutmut results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mutmut-results
          path: |
            .mutmut-cache
            html/
          if-no-files-found: ignore

  # Manual-only: costs money. Re-run after substantive changes via Actions tab.
  live-eval:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
      - run: pip install -e ".[dev]"
      - name: Seed demo
        run: python3 scripts/seed_demo.py
      - name: Live eval (requires OPENAI_API_KEY)
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "::error::OPENAI_API_KEY secret is not set."
            exit 1
          fi
          make eval-live
